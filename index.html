<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nataly's Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0/default.min.css">
<script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0/scroll-behaviour.min.js"></script>

<style>
/* ── TOKENS ─────────────────────────────────────────────────────────── */
:root {
  --cream:   #fdf8f3;
  --warm0:   #faf3eb;
  --warm1:   #f7ede0;
  --warm2:   #f0dfc8;
  --amber:   #e8a85f;
  --amber-d: #d4954a;
  --terr:    #c8714a;
  --rose-h:  #e8847a;
  --sage:    #8aab9a;
  --text:    #2e221a;
  --text2:   #5a4035;
  --muted:   #a0897a;
  --border:  rgba(200,170,140,0.35);
  --border2: rgba(200,170,140,0.15);
  --surface: #ffffff;
  --glass:   rgba(253,248,243,0.85);
  --shadow:  0 4px 24px rgba(46,34,26,0.10);
  --shadow2: 0 12px 40px rgba(46,34,26,0.16);
  --radius:  14px;
  --hh:      52px;  /* header row height */
  --px-min:  1.2;   /* pixels per minute */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--cream);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ─────────────────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, #2e221a 0%, #4a3028 60%, #3d2820 100%);
  color: white;
  padding: 0 32px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: var(--shadow2);
  position: relative;
  z-index: 100;
}

header::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle at 20% 50%, rgba(232,168,95,0.12) 0%, transparent 50%),
                    radial-gradient(circle at 80% 30%, rgba(200,113,74,0.10) 0%, transparent 40%);
  pointer-events: none;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
}

.brand-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--amber) 0%, var(--terr) 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 4px 12px rgba(232,168,95,0.4);
  flex-shrink: 0;
}

.header-brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.65rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: #fff;
  line-height: 1;
}

.header-brand p {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.5);
  font-weight: 300;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  position: relative;
}

.week-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 6px 12px;
  margin-right: 8px;
}

.week-nav span {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.8);
  font-weight: 600;
  min-width: 90px;
  text-align: center;
}

.week-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  font-size: 1rem;
  padding: 2px 6px;
  border-radius: 6px;
  transition: all 0.15s;
  font-family: 'Nunito', sans-serif;
}
.week-btn:hover { background: rgba(255,255,255,0.12); color: white; }

/* ── BUTTONS ─────────────────────────────────────────────────────────── */
.btn {
  padding: 9px 18px;
  border-radius: 10px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: 'Nunito', sans-serif;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  letter-spacing: 0.2px;
}
.btn-ghost {
  background: rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.75);
  border: 1px solid rgba(255,255,255,0.15);
}
.btn-ghost:hover { background: rgba(255,255,255,0.16); color: white; }

.btn-add-event {
  background: linear-gradient(135deg, var(--amber) 0%, var(--terr) 100%);
  color: white;
  box-shadow: 0 4px 14px rgba(232,168,95,0.45);
}
.btn-add-event:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(232,168,95,0.55);
}

/* ── TOOLBAR ─────────────────────────────────────────────────────────── */
.toolbar {
  background: var(--warm0);
  border-bottom: 1px solid var(--border);
  padding: 8px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.toolbar-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  font-weight: 600;
}

.day-filter { display: flex; gap: 4px; flex-wrap: wrap; }

.day-pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.day-pill.active { background: var(--text); color: white; border-color: var(--text); }
.day-pill:hover:not(.active) { border-color: var(--amber); color: var(--amber-d); }

.toolbar-sep { width: 1px; height: 22px; background: var(--border); }

.view-toggle { display: flex; gap: 4px; }
.view-btn {
  padding: 4px 14px;
  border-radius: 8px;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  transition: all 0.15s;
}
.view-btn.active { background: var(--amber); color: white; border-color: var(--amber); }
.view-btn:hover:not(.active) { border-color: var(--amber); }

.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sage); flex-shrink: 0; }
.status-text { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }

/* ── MAIN CALENDAR ───────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0;
}

.calendar-wrapper {
  flex: 1;
  display: flex;
  overflow: hidden;
  background: var(--surface);
}

.time-gutter {
  width: 72px;
  flex-shrink: 0;
  background: var(--warm0);
  border-right: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 10;
}

.gutter-corner {
  height: var(--hh);
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  flex-shrink: 0;
}

.time-scroll {
  overflow-y: auto;
  flex: 1;
  scrollbar-width: none;
}
.time-scroll::-webkit-scrollbar { display: none; }

.time-axis { position: relative; }

.time-tick {
  height: calc(var(--px-min) * 60 * 1px);
  position: relative;
  display: flex;
  align-items: flex-start;
}

.time-tick span {
  position: absolute;
  top: -9px;
  right: 10px;
  font-size: 0.68rem;
  color: var(--muted);
  font-weight: 600;
  white-space: nowrap;
}

/* Scroll area handling alignment for mobile */
.days-scroll-wrapper {
  flex: 1;
  overflow-x: auto; /* Enable horizontal scrolling on mobile */
  overflow-y: hidden;
  display: flex;
  flex-direction: column;
  -webkit-overflow-scrolling: touch;
}

.days-header-row {
  display: flex;
  flex-shrink: 0;
  border-bottom: 2px solid var(--border);
  background: var(--warm0);
  height: var(--hh);
  min-width: 100%;
  width: max-content;
}

.day-head {
  flex: 1 0 120px; /* Minimum width constraint */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text2);
  border-right: 1px solid var(--border);
  position: relative;
  cursor: default;
  transition: background 0.15s;
  gap: 1px;
}
.day-head:last-child { border-right: none; }

.day-head.today { background: rgba(232,168,95,0.12); }
.day-head.today .day-name { color: var(--amber-d); }

.day-name { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; }
.day-date-num {
  font-size: 1.2rem;
  font-weight: 700;
  font-family: 'Playfair Display', serif;
  color: var(--text);
  line-height: 1;
}
.day-head.today .day-date-num {
  background: var(--amber);
  color: white;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
}

/* Grid body */
.grid-body {
  flex: 1;
  display: flex;
  overflow-y: auto;
  overflow-x: hidden; /* X handled by parent */
  scroll-behavior: smooth;
  min-width: 100%;
  width: max-content;
}

.grid-body::-webkit-scrollbar { width: 6px; height: 6px; }
.grid-body::-webkit-scrollbar-track { background: var(--warm0); }
.grid-body::-webkit-scrollbar-thumb { background: var(--warm2); border-radius: 3px; }
.days-scroll-wrapper::-webkit-scrollbar { height: 6px; }
.days-scroll-wrapper::-webkit-scrollbar-track { background: var(--warm0); }
.days-scroll-wrapper::-webkit-scrollbar-thumb { background: var(--warm2); border-radius: 3px; }

/* Sync scrolling */
.grid-body, .time-scroll { scroll-behavior: smooth; }

/* Day column */
.day-col {
  flex: 1 0 120px; /* Minimum width constraint */
  border-right: 1px solid var(--border);
  position: relative;
  cursor: pointer;
}
.day-col:last-child { border-right: none; }

/* Hour lines inside column */
.hour-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: var(--border);
  pointer-events: none;
  z-index: 1;
}
.half-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: var(--border2);
  pointer-events: none;
  z-index: 1;
  border-top: 1px dashed rgba(200,170,140,0.2);
}

.now-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--rose-h);
  z-index: 8;
  pointer-events: none;
}
.now-line::before {
  content: '';
  position: absolute;
  left: -4px;
  top: -4px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--rose-h);
}

/* Drop indicator */
.drop-indicator {
  position: absolute;
  left: 3%;
  width: 94%;
  border: 2px dashed var(--amber);
  border-radius: 8px;
  background: rgba(232,168,95,0.08);
  pointer-events: none;
  z-index: 15;
  display: none;
}

/* ── EVENT CARDS ─────────────────────────────────────────────────────── */
.event-card {
  position: absolute;
  left: 3%;
  width: 94%;
  border-radius: 9px;
  padding: 5px 9px;
  font-size: 0.75rem;
  cursor: grab;
  user-select: none;
  border-left: 4px solid transparent;
  box-shadow: 0 2px 8px rgba(46,34,26,0.08);
  overflow: hidden;
  transition: box-shadow 0.15s, transform 0.1s, opacity 0.15s;
  z-index: 5;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  touch-action: none; /* Required for polyfill dragging */
}

.event-card:hover {
  box-shadow: 0 6px 18px rgba(46,34,26,0.14);
  transform: scale(1.01) translateY(-1px);
  z-index: 10;
}

.event-card.dragging {
  opacity: 0.45;
  cursor: grabbing;
}

.event-card .ev-title {
  font-weight: 700;
  font-size: 0.73rem;
  line-height: 1.25;
  pointer-events: none;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.event-card .ev-time {
  font-size: 0.6rem;
  opacity: 0.7;
  font-weight: 600;
  margin-top: 2px;
  pointer-events: none;
  white-space: nowrap;
}

/* resize handle */
.resize-handle {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 14px; /* Slightly larger for mobile tap */
  cursor: ns-resize;
  background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.08));
  border-radius: 0 0 9px 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: none; /* Crucial for touch resizing */
}
.resize-handle::after {
  content: '⋯';
  font-size: 0.55rem;
  opacity: 0.5;
  letter-spacing: 1px;
}

/* ── MODALS ──────────────────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(46,34,26,0.5);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 20px;
  padding: 36px;
  width: 460px;
  max-width: 95vw;
  max-height: 90dvh;
  overflow-y: auto;
  box-shadow: var(--shadow2), 0 0 0 1px rgba(200,170,140,0.2);
  animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.92) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.modal-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
}

.modal-close {
  width: 32px; height: 32px;
  border: none;
  background: var(--warm1);
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: all 0.15s;
}
.modal-close:hover { background: var(--warm2); color: var(--text); }

.form-group { margin-bottom: 20px; }

.form-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.form-input, .form-select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--warm2);
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  background: var(--cream);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  appearance: none;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px rgba(232,168,95,0.15);
}

.time-row { display: flex; gap: 12px; }
.time-row > div { flex: 1; }

.repeat-options { display: flex; gap: 8px; flex-wrap: wrap; }
.repeat-pill {
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--warm2);
  background: transparent;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  transition: all 0.15s;
}
.repeat-pill.active { background: var(--text); color: white; border-color: var(--text); }

.day-checkboxes { display: flex; gap: 6px; flex-wrap: wrap; }
.day-cb-label {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--warm2);
  color: var(--muted);
  transition: all 0.15s;
  user-select: none;
}
.day-cb-label input { display: none; }
.day-cb-label.checked { background: var(--amber); color: white; border-color: var(--amber); }

.swatch-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 6px;
}

.swatch {
  aspect-ratio: 1;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.12s, border-color 0.12s;
  position: relative;
}
.swatch:hover { transform: scale(1.15); }
.swatch.selected { border-color: var(--text); transform: scale(1.1); }
.swatch.selected::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: rgba(46,34,26,0.7);
  font-weight: 900;
}

.modal-footer {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--warm1);
}

.btn-modal-ghost { background: var(--warm1); color: var(--text2); border: none; }
.btn-modal-ghost:hover { background: var(--warm2); }

.btn-modal-primary {
  background: linear-gradient(135deg, var(--amber) 0%, var(--terr) 100%);
  color: white;
  border: none;
  box-shadow: 0 4px 12px rgba(232,168,95,0.4);
}
.btn-modal-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(232,168,95,0.5); }

.btn-modal-danger { background: #fff0f0; color: #c44040; border: none; margin-right: auto; }
.btn-modal-danger:hover { background: #ffe0e0; }

.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  padding: 13px 22px;
  background: var(--text);
  color: white;
  border-radius: 12px;
  font-size: 0.82rem;
  font-weight: 600;
  box-shadow: var(--shadow2);
  z-index: 1000;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show { opacity: 1; transform: translateY(0); }

.empty-hint {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.day-col:hover .empty-hint { opacity: 1; }
.empty-hint span {
  font-size: 0.7rem;
  color: var(--amber);
  background: rgba(232,168,95,0.1);
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 700;
  border: 1px dashed rgba(232,168,95,0.4);
}

/* ── RESPONSIVE MOBILE ───────────────────────────────────────────────── */
@media (max-width: 768px) {
  header {
    flex-direction: column;
    height: auto;
    padding: 16px;
    gap: 16px;
  }
  .header-brand { justify-content: center; width: 100%; }
  .header-actions { flex-wrap: wrap; justify-content: center; width: 100%; }
  .week-nav { margin-right: 0; width: 100%; justify-content: space-between; }
  
  .toolbar {
    flex-wrap: wrap;
    padding: 10px 16px;
    justify-content: center;
    gap: 10px;
  }
  .toolbar-right { margin-left: 0; width: 100%; justify-content: center; }
  
  .time-gutter { width: 56px; }
  .modal { padding: 20px; }
  .day-head, .day-col { flex: 1 0 135px; /* Larger tap targets on phone */ }
  .swatch-grid { grid-template-columns: repeat(5, 1fr); }
  .toast { left: 50%; transform: translate(-50%, 12px); right: auto; text-align: center; white-space: nowrap; }
  .toast.show { transform: translate(-50%, 0); }
}

/* ── PRINT ───────────────────────────────────────────────────────────── */
@media print {
  header, .toolbar { display: none !important; }
  body { overflow: auto; height: auto; }
  .main { overflow: auto; }
  .calendar-wrapper { overflow: visible; box-shadow: none; }
  .grid-body { overflow: visible; height: auto; }
}
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="brand-icon">🌸</div>
    <div>
      <h1>Nataly's Planner</h1>
      <p>Weekly Schedule</p>
    </div>
  </div>

  <div class="header-actions">
    <div class="week-nav">
      <button class="week-btn" id="prevWeek" title="Previous week">&#8249;</button>
      <span id="weekLabel">This Week</span>
      <button class="week-btn" id="nextWeek" title="Next week">&#8250;</button>
    </div>
    <button class="btn btn-ghost" onclick="goToday()">Today</button>
    <button class="btn btn-ghost" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-add-event" id="headerAddBtn">+ Add Event</button>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Days</span>
  <div class="day-filter" id="dayFilter"></div>

  <div class="toolbar-sep"></div>
  <span class="toolbar-label">View</span>
  <div class="view-toggle">
    <button class="view-btn active" id="view7" onclick="setView(7)">7-day</button>
    <button class="view-btn" id="view5" onclick="setView(5)">Mon–Fri</button>
    <button class="view-btn" id="view1" onclick="setView(1)">Day</button>
  </div>

  <div class="toolbar-right">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Loading…</span>
  </div>
</div>

<div class="main">
  <div class="calendar-wrapper">
    <div class="time-gutter">
      <div class="gutter-corner">Time</div>
      <div class="time-scroll" id="timeScroll">
        <div class="time-axis" id="timeAxis"></div>
      </div>
    </div>

    <div class="days-scroll-wrapper" id="daysScrollWrapper">
      <div class="days-header-row" id="daysHeaderRow"></div>
      <div class="grid-body" id="gridBody">
        </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalHeading">Add Event</h2>
      <button class="modal-close" onclick="closeEventModal()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">Event Name</label>
      <input type="text" class="form-input" id="evTitle" placeholder="e.g. Morning Yoga">
    </div>

    <div class="form-group">
      <label class="form-label">Day</label>
      <div class="day-checkboxes" id="evDayCheckboxes"></div>
    </div>

    <div class="form-group">
      <div class="time-row">
        <div>
          <label class="form-label">Start Time</label>
          <input type="time" class="form-input" id="evStart" value="09:00">
        </div>
        <div>
          <label class="form-label">End Time</label>
          <input type="time" class="form-input" id="evEnd" value="10:00">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Repeat on these days too</label>
      <div class="repeat-options">
        <button class="repeat-pill active" data-repeat="none" onclick="setRepeat('none',this)">Once</button>
        <button class="repeat-pill" data-repeat="weekdays" onclick="setRepeat('weekdays',this)">Weekdays</button>
        <button class="repeat-pill" data-repeat="daily" onclick="setRepeat('daily',this)">Every Day</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Colour</label>
      <div class="swatch-grid" id="swatchGrid"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-modal-danger" id="evDeleteBtn" onclick="deleteEvent()" style="display:none">Delete</button>
      <button class="btn btn-modal-ghost" onclick="closeEventModal()">Cancel</button>
      <button class="btn btn-modal-primary" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ── INJECT MOBILE DRAG & DROP POLYFILL ───────────────────────────── */
MobileDragDrop.polyfill({
    dragImageTranslateOverride: MobileDragDrop.scrollBehaviourDragImageTranslateOverride
});
// Required to prevent iOS scrolling issues when dragging
window.addEventListener('touchmove', function() {}, {passive: false});

/* ── CONSTANTS ─────────────────────────────────────────────────────── */
const ALL_DAYS  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const START_H   = 6;   // 6 AM
const END_H     = 22;  // 10 PM
const PX_MIN    = 1.5; // pixels per minute  — this is the key scaling variable
const SNAP      = 15;  // snap minutes

/* ── PALETTE ───────────────────────────────────────────────────────── */
const PALETTE = {
  blush:      { bg:'#ffe8ec', border:'#f4a0b0', label:'Blush' },
  rose:       { bg:'#fcd4dc', border:'#f07090', label:'Rose' },
  flamingo:   { bg:'#ffe5de', border:'#f09080', label:'Flamingo' },
  peach:      { bg:'#ffead4', border:'#f0a870', label:'Peach' },
  apricot:    { bg:'#fef0d8', border:'#f0c070', label:'Apricot' },
  honey:      { bg:'#fff5d0', border:'#f0d070', label:'Honey' },
  lemon:      { bg:'#fefbd4', border:'#e8e060', label:'Lemon' },
  matcha:     { bg:'#eaf4d8', border:'#9cc870', label:'Matcha' },
  mint:       { bg:'#d8f4e4', border:'#70c890', label:'Mint' },
  seafoam:    { bg:'#d4f4f0', border:'#60c0b8', label:'Seafoam' },
  sky:        { bg:'#d8eeff', border:'#70b0f0', label:'Sky' },
  periwinkle: { bg:'#ddd8f8', border:'#9090e0', label:'Periwinkle' },
  lavender:   { bg:'#ecdcf8', border:'#b080d0', label:'Lavender' },
  lilac:      { bg:'#f4d8f8', border:'#c070c8', label:'Lilac' },
  sand:       { bg:'#f0e8d8', border:'#c0a880', label:'Sand' },
  clay:       { bg:'#e8d4c8', border:'#b09080', label:'Clay' },
  mauve:      { bg:'#f0d8d8', border:'#c09090', label:'Mauve' },
  coral:      { bg:'#ffe0d4', border:'#f09878', label:'Coral' },
  amber:      { bg:'#fff0c8', border:'#e8b850', label:'Amber' },
  sage:       { bg:'#dce8d8', border:'#90b888', label:'Sage' },
};

/* ── STATE ─────────────────────────────────────────────────────────── */
let events      = [];   
let colorMap    = {};   
let viewDays    = 7;
let weekOffset  = 0;    
let editingId   = null;
let repeatMode  = 'none';
let dragData    = null; 
let resizeData  = null; 

const DEFAULT_COLOR_MAP = {
  "wake up & get ready":                                 "blush",
  "training (yoga/pilates/gym)":                         "mint",
  "beach, breakfast & makeup":                           "apricot",
  "make live videos":                                    "lavender",
  "organise life (insurance/job search/emails)":         "sky",
  "lunch & rest":                                        "sand",
  "study real estate":                                   "lilac",
  "dinner & series":                                     "rose",
  "make content":                                        "lemon",
};

const DEFAULT_TASKS = [
  { title:"Wake up & get ready",                            s:"06:00", e:"07:00" },
  { title:"Training (Yoga/Pilates/Gym)",                    s:"07:00", e:"09:00" },
  { title:"Beach, breakfast & makeup",                      s:"09:00", e:"11:30" },
  { title:"Make live videos",                               s:"11:30", e:"12:30" },
  { title:"Organise life (insurance/job search/emails)",    s:"12:30", e:"14:00" },
  { title:"Lunch & rest",                                   s:"14:00", e:"15:00" },
  { title:"Study real estate",                              s:"15:00", e:"18:00" },
  { title:"Dinner & series",                                s:"18:00", e:"19:30" },
  { title:"Make content",                                   s:"19:30", e:"21:00" },
];

/* ── UTILS ─────────────────────────────────────────────────────────── */
function t2m(ts){ const [h,m]=ts.split(':').map(Number); return h*60+m; }
function m2t(m){ return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function m2ampm(m){
  const h=Math.floor(m/60), mm=m%60, ap=h>=12?'PM':'AM', dh=h%12||12;
  return `${dh}:${String(mm).padStart(2,'0')} ${ap}`;
}
function snap(m){ return Math.round(m/SNAP)*SNAP; }
function uid(){ return Date.now() + Math.random().toString(36).slice(2); }

function getColor(titleOrKey){
  const k = titleOrKey.toLowerCase().trim();
  const key = colorMap[k] || Object.keys(PALETTE)[Math.floor(Math.random()*Object.keys(PALETTE).length)];
  if (!colorMap[k]) colorMap[k] = key;
  return PALETTE[key] || PALETTE.sand;
}

function getWeekDates(){
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow===0?6:dow-1) + weekOffset*7);
  return ALL_DAYS.map((_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}

function isToday(dateObj){
  const t=new Date();
  return dateObj.getDate()===t.getDate() && dateObj.getMonth()===t.getMonth() && dateObj.getFullYear()===t.getFullYear();
}

function formatWeekLabel(){
  const dates = getWeekDates();
  const fmt = d => d.toLocaleDateString('en-AU',{month:'short',day:'numeric'});
  return `${fmt(dates[0])} – ${fmt(dates[6])}`;
}

function visibleDays(){
  if(viewDays===1){
    const d=new Date(); const dow=d.getDay();
    const name = ALL_DAYS[dow===0?6:dow-1];
    return [name];
  }
  return ALL_DAYS.slice(0, viewDays===5?5:7);
}

/* ── INIT ──────────────────────────────────────────────────────────── */
function init(){
  loadData();
  buildSwatches();
  buildDayCheckboxes();
  buildDayFilter();
  buildTimeAxis();
  renderCalendar();
  updateWeekNav();
  startNowLine();

  document.getElementById('prevWeek').onclick = ()=>{ weekOffset--; renderCalendar(); updateWeekNav(); };
  document.getElementById('nextWeek').onclick = ()=>{ weekOffset++; renderCalendar(); updateWeekNav(); };
  document.getElementById('headerAddBtn').onclick = ()=> openEventModal(null, ALL_DAYS[0], snap(t2m('09:00')), snap(t2m('10:00')));

  const grid = document.getElementById('gridBody');
  const ts   = document.getElementById('timeScroll');
  grid.addEventListener('scroll', ()=>{ ts.scrollTop = grid.scrollTop; });

  setTimeout(()=>{ grid.scrollTop = 0; }, 100);

  document.addEventListener('keydown', e=>{
    if(e.key==='Escape'){ closeEventModal(); }
    if((e.key==='Enter'||e.key==='s')&&(e.metaKey||e.ctrlKey)&&document.getElementById('eventModal').classList.contains('open')){ e.preventDefault(); saveEvent(); }
  });
}

function loadData(){
  try {
    const s = localStorage.getItem('natalyPlanner_v3');
    if(s){ const p=JSON.parse(s); events=p.events||[]; colorMap=p.colorMap||{}; return; }
  } catch(e){}
  colorMap = {...DEFAULT_COLOR_MAP};
  let id=1;
  for(let i=0;i<5;i++){
    DEFAULT_TASKS.forEach(t=>{
      events.push({ id:String(id++), day:ALL_DAYS[i], title:t.title,
        startMin:t2m(t.s), endMin:t2m(t.e), colorKey:DEFAULT_COLOR_MAP[t.title.toLowerCase().trim()]||'sand' });
    });
  }
}

function saveData(){
  localStorage.setItem('natalyPlanner_v3', JSON.stringify({events,colorMap}));
  document.getElementById('statusDot').style.background='#8aab9a';
  document.getElementById('statusText').textContent='Saved · '+new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
}

/* ── TIME AXIS ─────────────────────────────────────────────────────── */
function buildTimeAxis(){
  const ax = document.getElementById('timeAxis');
  ax.innerHTML='';
  for(let h=START_H; h<=END_H; h++){
    const div=document.createElement('div');
    div.className='time-tick';
    div.style.height=`${PX_MIN*60}px`;
    const label = h===12?'12:00 PM':h>12?`${h-12}:00 PM`:`${h}:00 AM`;
    div.innerHTML=`<span>${label}</span>`;
    ax.appendChild(div);
  }
}

function updateWeekNav(){ document.getElementById('weekLabel').textContent = weekOffset===0?'This Week':formatWeekLabel(); }

function buildDayFilter(){
  const df=document.getElementById('dayFilter');
  df.innerHTML='';
  ALL_DAYS.forEach(d=>{
    const btn=document.createElement('button');
    btn.className='day-pill active';
    btn.textContent=d.slice(0,3);
    btn.dataset.day=d;
    df.appendChild(btn);
  });
}

function setView(n){
  viewDays=n;
  ['view7','view5','view1'].forEach(id=>{
    document.getElementById(id)?.classList.toggle('active', document.getElementById(id)?.id===`view${n}`);
  });
  renderCalendar();
}

function goToday(){ weekOffset=0; renderCalendar(); updateWeekNav(); }

/* ── RENDER CALENDAR ───────────────────────────────────────────────── */
function renderCalendar(){
  const gridBody      = document.getElementById('gridBody');
  const daysHeaderRow = document.getElementById('daysHeaderRow');
  const totalH        = (END_H - START_H + 1) * PX_MIN * 60; 
  const weekDates     = getWeekDates();
  const days          = visibleDays();

  daysHeaderRow.innerHTML='';
  days.forEach((day,i)=>{
    const date   = weekDates[ALL_DAYS.indexOf(day)];
    const todayClass = isToday(date) ? ' today' : '';
    const dateNum = date.getDate();
    const div = document.createElement('div');
    div.className=`day-head${todayClass}`;
    div.innerHTML=`<span class="day-name">${day.slice(0,3).toUpperCase()}</span>`+
      (isToday(date)
        ? `<div class="day-date-num">${dateNum}</div>`
        : `<span class="day-date-num" style="font-size:0.9rem;color:var(--muted)">${dateNum}</span>`);
    daysHeaderRow.appendChild(div);
  });

  gridBody.innerHTML='';
  days.forEach(day=>{
    const col = document.createElement('div');
    col.className='day-col';
    col.dataset.day=day;
    col.style.height=`${totalH}px`;

    for(let h=START_H; h<=END_H; h++){
      const hLine=document.createElement('div');
      hLine.className='hour-line';
      hLine.style.top=`${(h-START_H)*PX_MIN*60}px`;
      col.appendChild(hLine);
      if(h<END_H){
        const hf=document.createElement('div');
        hf.className='half-line';
        hf.style.top=`${(h-START_H+0.5)*PX_MIN*60}px`;
        col.appendChild(hf);
      }
    }

    const weekDates2 = getWeekDates();
    const date2 = weekDates2[ALL_DAYS.indexOf(day)];
    if(isToday(date2)){
      const nl=document.createElement('div');
      nl.className='now-line';
      nl.id=`now-${day}`;
      positionNowLine(nl);
      col.appendChild(nl);
    }

    const di=document.createElement('div');
    di.className='drop-indicator';
    di.id=`drop-${day}`;
    col.appendChild(di);

    const eh=document.createElement('div');
    eh.className='empty-hint';
    eh.innerHTML=`<span>+ Click to add</span>`;
    col.appendChild(eh);

    const dayEvs = events.filter(e=>e.day===day);
    dayEvs.forEach(ev=>{ col.appendChild(buildEventCard(ev)); });

    // Switched to 'click' to avoid accidental creation when scrolling on phone
    col.addEventListener('click', e=>{
      if(e.target!==col && !e.target.classList.contains('hour-line') && !e.target.classList.contains('half-line') && !e.target.classList.contains('empty-hint') && !e.target.closest('.empty-hint')) return;
      const rect=col.getBoundingClientRect();
      const y=e.clientY-rect.top;
      const clickedMin=START_H*60+y/PX_MIN;
      const sMin=snap(clickedMin);
      openEventModal(null, day, sMin, sMin+60);
    });

    col.addEventListener('dragover', onDragOver);
    col.addEventListener('dragleave', onDragLeave);
    col.addEventListener('drop', onDrop);

    gridBody.appendChild(col);
  });
}

/* ── BUILD EVENT CARD ──────────────────────────────────────────────── */
function buildEventCard(ev){
  const topPx   = (ev.startMin - START_H*60) * PX_MIN;
  const heightPx= (ev.endMin   - ev.startMin) * PX_MIN;
  const ck      = ev.colorKey || (colorMap[ev.title.toLowerCase().trim()]);
  const color   = (ck && PALETTE[ck]) ? PALETTE[ck] : getColor(ev.title);

  const card = document.createElement('div');
  card.className='event-card';
  card.dataset.id=ev.id;
  card.draggable=true;
  card.style.top=`${topPx}px`;
  card.style.height=`${Math.max(heightPx,22)}px`;
  card.style.backgroundColor=color.bg;
  card.style.borderLeftColor=color.border;
  card.style.color=darken(color.border);

  const small = heightPx < 36;
  card.innerHTML=`
    <div class="ev-title" style="${small?'font-size:0.65rem;':''}">${ev.title}</div>
    ${heightPx>=36?`<div class="ev-time">${m2ampm(ev.startMin)} – ${m2ampm(ev.endMin)}</div>`:''}
    <div class="resize-handle" data-id="${ev.id}"></div>
  `;

  card.addEventListener('dragstart', e=>{
    const rect=card.getBoundingClientRect();
    const offsetPx=e.clientY-rect.top;
    const offsetMin=Math.round(offsetPx/PX_MIN);
    dragData={ id:ev.id, offsetMin, origEl:card };
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain', ev.id);
    setTimeout(()=>card.classList.add('dragging'),0);
  });

  card.addEventListener('dragend', ()=>{
    card.classList.remove('dragging');
    dragData=null;
    document.querySelectorAll('.drop-indicator').forEach(d=>d.style.display='none');
  });

  card.addEventListener('click', e=>{
    e.stopPropagation();
    if(e.target.classList.contains('resize-handle')||e.target.closest('.resize-handle')) return;
    openEventModal(ev.id);
  });

  // Updated to pointerdown/up for touch capability!
  const rh = card.querySelector('.resize-handle');
  rh.addEventListener('pointerdown', e=>{
    e.stopPropagation(); e.preventDefault();
    resizeData={ id:ev.id, startY:e.clientY, origEndMin:ev.endMin };
    document.addEventListener('pointermove', onResizeMove);
    document.addEventListener('pointerup', onResizeEnd);
    document.addEventListener('pointercancel', onResizeEnd);
    card.style.cursor='ns-resize';
    rh.setPointerCapture(e.pointerId);
  });

  return card;
}

function darken(hex){
  return hex.replace(/^#/,'').match(/.{2}/g)
    .map(c=>Math.max(0,parseInt(c,16)-60).toString(16).padStart(2,'0'))
    .reduce((a,b)=>a+b,'#');
}

/* ── RESIZE ────────────────────────────────────────────────────────── */
function onResizeMove(e){
  if(!resizeData) return;
  const ev = events.find(x=>x.id===resizeData.id);
  if(!ev) return;
  const deltaPx = e.clientY - resizeData.startY;
  const deltaMin = deltaPx / PX_MIN;
  let newEnd = snap(resizeData.origEndMin + deltaMin);
  newEnd = Math.max(ev.startMin + SNAP, Math.min(END_H*60, newEnd));
  ev.endMin = newEnd;

  const card = document.querySelector(`.event-card[data-id="${resizeData.id}"]`);
  if(card){
    const hp=(ev.endMin-ev.startMin)*PX_MIN;
    card.style.height=`${Math.max(hp,22)}px`;
    const tt=card.querySelector('.ev-time');
    if(tt) tt.textContent=`${m2ampm(ev.startMin)} – ${m2ampm(ev.endMin)}`;
  }
}

function onResizeEnd(){
  document.removeEventListener('pointermove', onResizeMove);
  document.removeEventListener('pointerup', onResizeEnd);
  document.removeEventListener('pointercancel', onResizeEnd);
  resizeData=null;
  saveData();
  renderCalendar();
}

/* ── DRAG & DROP ───────────────────────────────────────────────────── */
function onDragOver(e){
  e.preventDefault();
  if(!dragData) return;
  const col=e.currentTarget;
  const day=col.dataset.day;
  const rect=col.getBoundingClientRect();
  const y=e.clientY-rect.top;
  const rawMin=START_H*60+(y/PX_MIN)-dragData.offsetMin;
  const sMin=snap(rawMin);

  const ev=events.find(x=>x.id===dragData.id);
  if(!ev) return;
  const dur=ev.endMin-ev.startMin;
  const topPx=(sMin-START_H*60)*PX_MIN;

  const di=document.getElementById(`drop-${day}`);
  if(di){
    di.style.display='block';
    di.style.top=`${topPx}px`;
    di.style.height=`${dur*PX_MIN}px`;
  }
}

function onDragLeave(e){
  const col=e.currentTarget;
  const di=document.getElementById(`drop-${col.dataset.day}`);
  if(di) di.style.display='none';
}

function onDrop(e){
  e.preventDefault();
  if(!dragData) return;
  const col=e.currentTarget;
  const day=col.dataset.day;
  const rect=col.getBoundingClientRect();
  const y=e.clientY-rect.top;
  const rawMin=START_H*60+(y/PX_MIN)-dragData.offsetMin;
  let sMin=snap(rawMin);

  const evIdx=events.findIndex(x=>x.id===dragData.id);
  if(evIdx<0) return;
  const dur=events[evIdx].endMin-events[evIdx].startMin;
  sMin=Math.max(START_H*60, Math.min(END_H*60-dur, sMin));

  events[evIdx].day=day;
  events[evIdx].startMin=sMin;
  events[evIdx].endMin=sMin+dur;

  const di=document.getElementById(`drop-${day}`);
  if(di) di.style.display='none';

  saveData();
  renderCalendar();
  toast('✓ Event moved');
}

function positionNowLine(el){
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const top=(nowMin-START_H*60)*PX_MIN;
  el.style.top=`${top}px`;
}

function startNowLine(){
  setInterval(()=>{ document.querySelectorAll('.now-line').forEach(nl=>positionNowLine(nl)); }, 60000);
}

function buildSwatches(){
  const g=document.getElementById('swatchGrid');
  g.innerHTML='';
  Object.entries(PALETTE).forEach(([key,val])=>{
    const s=document.createElement('div');
    s.className='swatch';
    s.style.backgroundColor=val.bg;
    s.style.border=`2px solid ${val.border}`;
    s.dataset.key=key;
    s.title=val.label;
    s.onclick=()=>{
      document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('selected'));
      s.classList.add('selected');
    };
    g.appendChild(s);
  });
}

function buildDayCheckboxes(){
  const c=document.getElementById('evDayCheckboxes');
  c.innerHTML='';
  ALL_DAYS.forEach(d=>{
    const lbl=document.createElement('label');
    lbl.className='day-cb-label';
    lbl.innerHTML=`<input type="checkbox" value="${d}">${d.slice(0,3)}`;
    lbl.querySelector('input').addEventListener('change',()=>{ lbl.classList.toggle('checked', lbl.querySelector('input').checked); });
    c.appendChild(lbl);
  });
}

function setDayCheckboxes(days){
  document.querySelectorAll('.day-cb-label').forEach(lbl=>{
    const cb=lbl.querySelector('input');
    const checked=days.includes(cb.value);
    cb.checked=checked;
    lbl.classList.toggle('checked',checked);
  });
}

function getCheckedDays(){ return [...document.querySelectorAll('.day-cb-label input:checked')].map(i=>i.value); }

function setRepeat(mode, btn){
  repeatMode=mode;
  document.querySelectorAll('.repeat-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');

  if(mode==='weekdays'){ setDayCheckboxes(['Monday','Tuesday','Wednesday','Thursday','Friday']); }
  else if(mode==='daily'){ setDayCheckboxes(ALL_DAYS); }
}

function openEventModal(id=null, day=null, startMin=null, endMin=null){
  editingId=id;
  repeatMode='none';
  document.querySelectorAll('.repeat-pill').forEach((p,i)=>p.classList.toggle('active',i===0));

  if(id){
    const ev=events.find(e=>e.id===id);
    document.getElementById('modalHeading').textContent='Edit Event';
    document.getElementById('evTitle').value=ev.title;
    document.getElementById('evStart').value=m2t(ev.startMin);
    document.getElementById('evEnd').value=m2t(ev.endMin);
    setDayCheckboxes([ev.day]);
    document.getElementById('evDeleteBtn').style.display='inline-flex';

    const ck=ev.colorKey||(colorMap[ev.title.toLowerCase().trim()]);
    document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('selected',s.dataset.key===ck));
  } else {
    document.getElementById('modalHeading').textContent='Add Event';
    document.getElementById('evTitle').value='';
    document.getElementById('evStart').value=m2t(startMin||t2m('09:00'));
    document.getElementById('evEnd').value=m2t(endMin||t2m('10:00'));
    setDayCheckboxes(day?[day]:[ALL_DAYS[0]]);
    document.getElementById('evDeleteBtn').style.display='none';
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
  }

  document.getElementById('eventModal').classList.add('open');
  setTimeout(()=>document.getElementById('evTitle').focus(), 120);
}

function closeEventModal(){ document.getElementById('eventModal').classList.remove('open'); }

document.getElementById('eventModal').addEventListener('click', e=>{
  if(e.target===document.getElementById('eventModal')) closeEventModal();
});

function saveEvent(){
  const title=document.getElementById('evTitle').value.trim();
  if(!title){ shake(document.getElementById('evTitle')); return; }

  const sMin=t2m(document.getElementById('evStart').value);
  const eMin=t2m(document.getElementById('evEnd').value);
  if(eMin<=sMin){ shake(document.getElementById('evEnd')); toast('⚠️ End must be after start','error'); return; }

  const days=getCheckedDays();
  if(!days.length){ toast('⚠️ Select at least one day','error'); return; }

  const selSwatch=document.querySelector('.swatch.selected');
  const colorKey=selSwatch?selSwatch.dataset.key:Object.keys(PALETTE)[Math.floor(Math.random()*Object.keys(PALETTE).length)];
  colorMap[title.toLowerCase().trim()]=colorKey;

  if(editingId){
    const ev=events.find(e=>e.id===editingId);
    ev.title=title; ev.startMin=sMin; ev.endMin=eMin;
    ev.day=days[0]; ev.colorKey=colorKey;
    days.slice(1).forEach(d=>{
      if(!events.find(e=>e.title===title&&e.day===d&&e.startMin===sMin)){
        events.push({id:uid(),day:d,title,startMin:sMin,endMin:eMin,colorKey});
      }
    });
  } else {
    days.forEach(d=>{ events.push({id:uid(),day:d,title,startMin:sMin,endMin:eMin,colorKey}); });
  }

  closeEventModal();
  saveData();
  renderCalendar();
  toast('✓ Event saved');
}

function deleteEvent(){
  if(!editingId) return;
  events=events.filter(e=>e.id!==editingId);
  closeEventModal();
  saveData();
  renderCalendar();
  toast('Event deleted');
}

function toast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background= type==='error'?'#c44040':'#2e221a';
  t.classList.add('show');
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.classList.remove('show'),2400);
}

function shake(el){
  el.style.animation='none';
  el.style.borderColor='#c44040';
  el.style.boxShadow='0 0 0 3px rgba(196,64,64,0.15)';
  setTimeout(()=>{ el.style.borderColor=''; el.style.boxShadow=''; },1200);
}

init();
</script>
</body>
</html>
